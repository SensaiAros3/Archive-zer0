<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="logo.ico">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archive-ZER0 // Entry</title>

  <style>
    body {
      background: #000;
      color: #e0e0e0;
      font-family: Consolas, monospace;
      padding: 40px;
      line-height: 1.6;
    }

    .top-section {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 30px;
    }

    .logo {
      width: 120px;
      cursor: pointer;
      filter: drop-shadow(0 0 6px #00ffff55);
    }

    h1 {
      margin: 0;
      font-size: 28px;
      color: #fff;
      letter-spacing: 2px;
    }

    p {
      margin: 0;
      color: #999;
    }

    #anomaly {
      margin-top: 30px;
      white-space: pre-wrap;
      background: #050505;
      padding: 20px;
      border-left: 2px solid #00ffff;
    }

    .error {
      color: #ff4d4d;
    }

    .loading {
      color: #00ffff;
    }
  </style>
</head>

<body>

  <div class="top-section">
    <a href="index.html">
      <img src="images/logo.png" class="logo">
    </a>

    <div>
      <h1>ARCHIVE-ZER0</h1>
      <p>“Every world leaves echoes.”</p>
    </div>
  </div>

  <div id="anomaly" class="loading">Decrypting anomaly...</div>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script>
    const supabaseUrl = "https://gqgyaigsieynxgxgzdvm.supabase.co"
    const supabaseKey = "YOUR_ANON_KEY"

    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey)

    const params = new URLSearchParams(window.location.search)
    const id = params.get("id")

    const box = document.getElementById("anomaly")

    function glitchText(text) {
      return text.replace(/█/g, () => Math.random() > 0.5 ? "█" : "▒")
    }

    async function load() {
      if (!id) {
        box.innerHTML = "<span class='error'>No anomaly ID provided.</span>"
        return
      }

      const { data, error } = await supabaseClient
        .from("anomalies")
        .select("*")
        .eq("code_name", id.toLowerCase())
        .single()

      if (error || !data) {
        box.innerHTML = "<span class='error'>Anomaly not found.</span>"
        return
      }

      let output = `
${data.code_name.toUpperCase()}
Class: ${data.threat_level}

Containment: ${data.archive}

Status: ${data.status}

Description:
${data.description}

--- LOGS ---
      `

      // fake log system (you can expand later in DB)
      const logs = [
        "Observation session initiated.",
        "Subject remains unstable under direct viewing.",
        "Minor reflection distortion detected.",
        "████ signal interference recorded."
      ]

      logs.forEach(l => {
        output += "\n" + l
      })

      box.innerHTML = glitchText(output)
    }

    load()
  </script>

</body>
</html>
