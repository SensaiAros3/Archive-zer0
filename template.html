<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="logo.ico">
  <link rel="stylesheet" href="styles.css">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Archive-ZER0</title>

  <style>
    .error {
      color: red;
    }

    body {
  padding: 20px;
}

.fade-in {
  max-width: 1100px;
  margin: auto;
}

pre {
  white-space: pre-wrap;
  line-height: 1.5;
}

#main-data {
  margin-top: 20px;
  margin-bottom: 30px;
}

.scp-entry {
  margin-top: 10px;
}

#logs-container pre {
  margin-bottom: 12px;
}
  </style>
</head>

<body>

  <!-- TERMINAL SHORTCUT -->
  <script>
    document.addEventListener("keydown", function(event) {
      if (event.ctrlKey && event.key.toLowerCase() === "`") {
        event.preventDefault()
        window.location.href = "wander-page.html"
      }
    })
  </script>

  <div class="fade-in">

    <!-- TOP SECTION -->
    <div class="top-section">

      <a href="index.html">
        <img src="images/logo.png" alt="Archive Logo" class="logo">
      </a>

      <div class="site-title">
        <h1>ARCHIVE-ZER0</h1>
        <p>
          “Every world leaves echoes.<br>
          We collect them.”
        </p>
      </div>

    </div>

    <!-- MAIN ANOMALY DATA -->
    <pre id="main-data">
Decrypting anomaly...
    </pre>

    <!-- LOGS -->
    <div class="scp-entry">

      <h2 style="font-family: Consolas;">
        Logs:
      </h2>

      <div id="logs-container">
        <pre>Loading logs...</pre>
      </div>

    </div>

  </div>

  <footer>
    ARCHIVE-ZER0 © ████-2025
  </footer>

  <!-- SUPABASE -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script>

    // ===== SUPABASE =====

    const supabaseUrl = "https://gqgyaigsieynxgxgzdvm.supabase.co"

    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdxZ3lhaWdzaWV5bnhneGd6ZHZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNjczNDYsImV4cCI6MjA5Mjk0MzM0Nn0.UkTumgRaj7ModAUeE_Fg5vTA2VL0Hug-4lo_DUSgRNM"

    const supabaseClient = supabase.createClient(
      supabaseUrl,
      supabaseKey
    )

    // ===== URL PARAM =====

    const params = new URLSearchParams(window.location.search)

    const id = params.get("id")

    // ===== DOM =====

    const mainData = document.getElementById("main-data")

    const logsContainer = document.getElementById("logs-container")

    // ===== LOAD ANOMALY =====

    async function loadAnomaly() {

      if (!id) {

        mainData.innerHTML = `
          <span class="error">
            No anomaly ID provided.
          </span>
        `

        return
      }

      const { data, error } = await supabaseClient
        .from("anomalies")
        .select("*")
        .eq("code_name", id.toLowerCase())
        .single()

      if (error || !data) {

        mainData.innerHTML = `
          <span class="error">
            Anomaly not found.
          </span>
        `

        return
      }

      // ===== MAIN INFO =====

      mainData.textContent = `
${data.code_name.toUpperCase()}

Class: ${data.threat_level}

Containment:
${data.containment || "UNKNOWN"}

Description:
${data.description}

Behavior:
${data.behavior || "UNKNOWN"}

Status:
${data.status || "UNKNOWN"}
      `

      // ===== LOGS =====

      logsContainer.innerHTML = ""

      if (data.logs && Array.isArray(data.logs)) {

        data.logs.forEach(log => {

          const pre = document.createElement("pre")

          pre.textContent = `
${log.title}

Date: ${log.date}

${log.content}
          `

          logsContainer.appendChild(pre)

        })

      } else {

        logsContainer.innerHTML = `
          <pre>No logs found.</pre>
        `

      }

    }

    loadAnomaly()

  </script>

</body>
</html>
